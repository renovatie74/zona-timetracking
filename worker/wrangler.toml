name = "timetracking-api"
main = "src/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── DEV environment ────────────────────────────────────────────────────────────
[env.dev]
name = "timetracking-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "timetracking-dev"
database_id = "6b8538e1-e9d9-48c1-a317-a6fc8aafa569"

[env.dev.triggers]
crons = ["30 19 * * *"]  # 23:30 Dubai (UTC+4) = 19:30 UTC

[env.dev.vars]
ENVIRONMENT = "development"
EMAIL_FROM  = "noreply@zonaproperties.ae"
APP_URL     = "https://dev-time.zonaproperties.ae"

# Secrets (set via wrangler secret put, never committed):
#   wrangler secret put JWT_SECRET --env dev
#   wrangler secret put EMAIL_API_KEY --env dev

# ── PROD environment ───────────────────────────────────────────────────────────
[env.prod]
name = "timetracking-api-prod"

[[env.prod.d1_databases]]
binding = "DB"
database_name = "timetracking-prod"
database_id = "c8665148-9c5e-4c66-becb-86d821bbf958"

[env.prod.triggers]
crons = ["30 19 * * *"]  # 23:30 Dubai (UTC+4) = 19:30 UTC

[env.prod.vars]
ENVIRONMENT = "production"
EMAIL_FROM  = "noreply@zonaproperties.ae"
APP_URL     = "https://time.zonaproperties.ae"

# Secrets:
#   wrangler secret put JWT_SECRET --env prod
#   wrangler secret put EMAIL_API_KEY --env prod
